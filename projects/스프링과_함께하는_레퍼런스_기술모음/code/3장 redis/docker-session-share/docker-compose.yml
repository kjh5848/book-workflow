version: '3'

services:
  redis:                                      # 세션 저장용 Redis
    image: redis                              # Redis 이미지
    container_name: redis
    ports:
      - "6379:6379"                           # 외부 접근용 (옵션)

  app1:                                       # 첫 번째 Spring Boot 서버
    build:
      context: ./app1                         # app1 디렉터리의 Dockerfile 사용
    container_name: app1
    restart: always
    depends_on:
      - redis                                 # Redis가 먼저 실행되어야 함
    ports:
      - "8081:8080"          

  app2:                                       # 두 번째 Spring Boot 서버
    build:
      context: ./app2
    container_name: app2
    restart: always
    depends_on:
      - redis
    ports:
      - "8082:8080" 

  nginx:                                      # 라우팅 및 로드밸런서
    image: nginx
    container_name: nginx
    depends_on:
      - app1
      - app2
    ports:
      - "80:80"                               # 외부 접근 포트
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
