spring.application.name=producer
server.port=8080


######################################
# ===== GitHub 폴링(주기적 체크) 설정 =====
# 감시할 GitHub 리포지토리의 소유자(계정/조직) 이름
github.owner=kjh5848

# 감시할 GitHub 리포지토리 이름
github.repo=config-readme

# 변경 여부를 확인할 파일 경로(리포지토리 루트 기준)
github.readme-path=README.md

# GitHub API를 조회하는 주기(밀리초). 예: 30000 = 30초
github.poll-interval-ms=90000


######################################
# ===== RabbitMQ 브로커 연결 설정 =====
# RabbitMQ 호스트(로컬 실행이면 보통 localhost)
spring.rabbitmq.host=localhost

# RabbitMQ 포트(기본 5672)
spring.rabbitmq.port=5672

# RabbitMQ 접속 계정(개발 기본값 guest)
spring.rabbitmq.username=guest

# RabbitMQ 접속 비밀번호(개발 기본값 guest)
spring.rabbitmq.password=guest


######################################
# ===== 메시징(Exchange/Queue/RoutingKey) 토폴로지 설정 =====
# Producer/Consumer가 공통으로 사용하는 Exchange 이름
rabbit.exchange=github.events

# Consumer가 바인딩할 Queue 이름
rabbit.queue=repo-updates

# Exchange -> Queue 라우팅에 사용할 Routing Key
rabbit.routing-key=readme.changed
