# --------------------------------------
# [기본 애플리케이션 설정]
# --------------------------------------
spring.application.name=spring-oauth
server.port=8080

# env 파일 읽기
spring.config.import=optional:file:.env[.properties]

# --------------------------------------
# [H2 Database 설정]
# --------------------------------------
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA 설정 (Entity 기반 테이블 자동 생성)
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.data-locations=classpath:db/data.sql

# --------------------------------------
# [Kakao OAuth2 설정]
# --------------------------------------
kakao.client-id=${KAKAO_CLIENT_ID}
kakao.client-secret=${KAKAO_CLIENT_SECRET}

# --------------------------------------
# 카카오 OAuth 2.0 인가 요청 주소
# --------------------------------------
# 사용자가 "카카오 로그인" 버튼을 눌렀을 때
# 브라우저를 리다이렉트시키는 카카오 인증 페이지 주소
# → 여기서 사용자 로그인 + 권한 동의 화면이 표시됨
kakao.authorize-uri=https://kauth.kakao.com/oauth/authorize


# --------------------------------------
# 카카오 로그인 완료 후 콜백(리다이렉트) 주소
# --------------------------------------
# 사용자가 카카오 로그인 및 동의를 완료하면
# 카카오가 인가 코드(code)를 함께 전달해주는 우리 서버 주소
# → 이 주소에서 code를 받아 access token 교환을 시작함
kakao.redirect-uri=http://localhost:8080/oauth/callback


# --------------------------------------
# 카카오 Access Token 발급 요청 주소
# --------------------------------------
# 인가 코드(code)를 받은 뒤,
# 우리 서버가 카카오에 직접 요청하여 access token을 발급받는 API 주소
# → client_id, client_secret, code 등을 함께 전송함
kakao.token-uri=https://kauth.kakao.com/oauth/token


# --------------------------------------
# 카카오 사용자 정보 조회 API 주소
# --------------------------------------
# 발급받은 access token을 Authorization 헤더에 담아 호출하면
# 카카오 사용자 정보(아이디, 이메일, 프로필 등)를 반환해주는 API
kakao.user-info-uri=https://kapi.kakao.com/v2/user/me