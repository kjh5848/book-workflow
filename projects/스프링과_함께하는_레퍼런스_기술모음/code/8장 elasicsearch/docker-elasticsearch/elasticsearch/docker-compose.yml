services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.8
    container_name: elasticsearch
    # 기본값: 9200(REST API), 9300(Transport) 포트 사용
    # → REST API는 외부에서 접근해야 하므로 9200만 노출
    ports:
      - "9200:9200"

    environment:
      # [필수] 단일 노드 모드 — 기본값 아님
      # ES는 기본적으로 클러스터 구성(3노드 이상)을 요구하므로
      # 개발/교육에서는 반드시 single-node 설정 필요
      - discovery.type=single-node

      # [필수] 보안 OFF — 기본값은 보안 ON
      # 기본값: xpack.security.enabled=true
      # 보안 활성화 상태에서는 Kibana/Spring이 인증 없이 접근 불가
      - xpack.security.enabled=false

      # [필수] JVM 메모리 설정 — 기본값 없음
      # Elasticsearch는 기본적으로 최소 1GB 힙 메모리가 필요
      # -Xms(최소), -Xmx(최대)
      - ES_JAVA_OPTS=-Xms1g -Xmx1g

    networks:
      - es-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.19.8

    # 기본값: 5601 포트 사용 → UI 접근 필요하므로 노출해야 함
    ports:
      - "5601:5601"

    environment:
      # [필수] Kibana → Elasticsearch 연결 주소
      # 기본적으로 Kibana는 localhost:9200을 사용하지 않음
      # 도커 서비스 이름(elasticsearch)을 사용해야 연결됨
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - es-network

  app:
    build:
      context: ..
      dockerfile: elasticsearch/Dockerfile
    container_name: spring-elasticsearch-app
    ports:
      - "8080:8080"
    networks:
      - es-network

networks:
  es-network:
    driver: bridge
