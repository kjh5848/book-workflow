version: "3.9"

# 리뷰용 docker-compose: 5434 포트 사용 (기존 5432 포트 충돌 방지)
services:
  postgres:
    image: postgres:16-alpine
    container_name: connecthr_db_review
    restart: unless-stopped
    environment:
      POSTGRES_DB: connecthr_db
      POSTGRES_USER: connecthr
      POSTGRES_PASSWORD: connecthr_pass
    ports:
      - "5434:5432"
    volumes:
      - ./data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connecthr -d connecthr_db"]
      interval: 5s
      timeout: 5s
      retries: 10
